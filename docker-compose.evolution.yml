version: '3.9'

services:
  evolution-api:
    container_name: evolution_api
    image: atendai/evolution-api:v2.1.1
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      # Variavel minima exigida pela Evolution API
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY:-mude-me}
      # Dentro da rede Docker, use o nome do servico Redis
      CACHE_REDIS_URI: ${CACHE_REDIS_URI:-redis://redis:6379/6}
      # A imagem v2.1.1 executa migracoes no boot e exige URI nao vazia
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@postgres:5432/evolution?schema=public
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - evolution_instances:/evolution/instances

  redis:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - evolution_redis_data:/data

  postgres:
    image: postgres:15-alpine
    container_name: evolution_postgres
    restart: always
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data

volumes:
  evolution_instances:
  evolution_redis_data:
  evolution_postgres_data:
